name: "ci workflow"
on:
  push:
    branches:
      - master
jobs:
  determine-env:
    runs-on: ubuntu-latest
    
    steps:
      - name: "starting ci workflow"
        run: echo "starting ci workflow"
  check-changes:
    runs-on: ubuntu-latest
    steps:
      - name: "checking for changes"
        run: echo "checking for changes"
  deploy-b2b-dashboard:
    runs-on: ubuntu-latest
    needs: check-changes
    steps:
      - run: echo "deploy b2b dashboard"

  deploy-apis:
    runs-on: ubuntu-latest
    needs: check-changes
    steps:
      - run: echo "deploy apis"

  deploy-aws-api-docs:
    runs-on: ubuntu-latest
    needs: check-changes
    steps:
      - run: echo "deploy docs"

  deploy-aws-db-stack:
    runs-on: ubuntu-latest
    needs: check-changes
    steps:
      - run: echo "deploy db"
  